<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />

    <!-- Primary Meta Tags -->
    <title>Polymarket - Prediction Markets</title>
    <meta name="title" content="Polymarket - Prediction Markets" />
    <meta name="description" content="The world's largest prediction market. Trade on the outcome of events in crypto, politics, sports, and more." />
    <meta name="keywords" content="prediction markets, polymarket, crypto, betting, politics, sports, trading" />
    <meta name="author" content="Polymarket" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" href="/favicon.ico" />

    <!-- PWA / Web App Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2E5CFF" />
    <meta name="background-color" content="#131722" />

    <!-- iOS / Apple Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Polymarket" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- iOS Splash Screens (optional but nice) -->
    <meta name="apple-touch-fullscreen" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://polymarket.com/" />
    <meta property="og:title" content="Polymarket - Prediction Markets" />
    <meta property="og:description" content="The world's largest prediction market. Trade on the outcome of events in crypto, politics, sports, and more." />
    <meta property="og:image" content="/icon-512x512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:site_name" content="Polymarket" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://polymarket.com/" />
    <meta name="twitter:title" content="Polymarket - Prediction Markets" />
    <meta name="twitter:description" content="The world's largest prediction market. Trade on the outcome of events in crypto, politics, sports, and more." />
    <meta name="twitter:image" content="/icon-512x512.png" />
    <meta name="twitter:site" content="@Polymarket" />
    <meta name="twitter:creator" content="@Polymarket" />

    <!-- Microsoft / Windows -->
    <meta name="msapplication-TileColor" content="#2E5CFF" />
    <meta name="msapplication-TileImage" content="/icon-192x192.png" />
    <meta name="msapplication-config" content="none" />

    <!-- Additional SEO -->
    <meta name="robots" content="index, follow" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="canonical" href="https://polymarket.com/" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
